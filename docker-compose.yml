services:
  lazy-agent-client:
    image: lazy-agent-client:latest
    container_name: lazy-agent-client
    restart: unless-stopped
    ports:
      - "3334:3333"
    env_file:
      - .env
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - /usr/share/zoneinfo/America/Los_Angeles:/etc/localtime:ro
      - ./projects.json:/app/projects.json:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "-O",
          "/dev/null",
          "http://localhost:3333/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
